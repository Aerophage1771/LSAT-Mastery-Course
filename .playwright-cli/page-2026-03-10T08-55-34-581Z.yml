          - 'heading "Tool 1: Indicator Words" [level=4] [ref=e553]'
          - paragraph [ref=e554]: Indicator words are fast structural clues. Conclusion indicators (*therefore, thus, so*) usually point toward the claim being supported. Premise indicators (*because, since, for*) usually point toward the evidence doing the support work.
          - 'heading "Tool 2: The Why Test" [level=4] [ref=e555]'
          - paragraph [ref=e556]: Ask "Why should I believe that?" of your candidate conclusion. If the rest of the argument answers that question, you have probably found a conclusion. If the argument gives no further support, you are probably looking at a premise.
