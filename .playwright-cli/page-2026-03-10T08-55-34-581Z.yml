          - heading "The 5-Step Method for Argument Part Questions" [level=2] [ref=e396]
          - paragraph [ref=e397]: This lesson turns Argument Part into a repeatable workflow. The goal is not to improvise from scratch on every question; it is to run the same sequence each time so you can identify the target sentence, map the support chain, and translate that role into LSAT answer-choice language.
          - generic [ref=e398]:
            - generic [ref=e399]:
              - img [ref=e400]
              - generic [ref=e402]: Timing
            - paragraph [ref=e404]:
              - text: You should spend roughly
              - strong [ref=e405]: 1 minute and 25 seconds
              - text: per Argument Part question. At first, the 5-step method will feel deliberate. That is fine. Speed comes from repeating the same method until the steps compress into one quick structural read.
          - heading "Overview" [level=3] [ref=e407]
          - generic [ref=e408]:
            - generic [ref=e409]: The 5-Step Method
            - generic [ref=e412]:
              - generic [ref=e413]:
                - generic [ref=e414]: "1"
                - generic [ref=e416]:
                  - strong [ref=e417]: "Step 1 — Find the Target:"
                  - text: Read the stem first and identify the exact sentence or idea you will need to classify.
              - generic [ref=e418]:
                - generic [ref=e419]: "2"
                - generic [ref=e421]:
                  - strong [ref=e422]: "Step 2 — Analyze & Hypothesize:"
                  - text: Read the stimulus once, tagging each sentence with a tentative role.
              - generic [ref=e423]:
                - generic [ref=e424]: "3"
                - generic [ref=e426]:
                  - strong [ref=e427]: "Step 3 — Map the Structure:"
                  - text: Confirm the support flow with indicator words and the Why Test.
              - generic [ref=e428]:
                - generic [ref=e429]: "4"
                - generic [ref=e431]:
                  - strong [ref=e432]: "Step 4 — Pinpoint & Prephrase:"
                  - text: State the target's exact function in your own words before looking at the choices.
              - generic [ref=e433]:
                - generic [ref=e434]: "5"
                - generic [ref=e436]:
                  - strong [ref=e437]: "Step 5 — Evaluate Choices:"
                  - text: Match your prephrase to the abstract LSAT wording and eliminate reversals.
          - 'heading "Step 1: Find the Target Statement" [level=2] [ref=e439]'
          - paragraph [ref=e440]:
            - text: Start with the question stem, not the stimulus. In Argument Part, the stem tells you what to track. Your job in this first step is simply to know
            - strong [ref=e441]: exactly which sentence or idea
            - text: the question wants you to classify.
          - heading "Example" [level=4] [ref=e442]
          - generic [ref=e443]: "\"The claim that increased carbon emissions are unlikely to be the sole cause of recent temperature changes plays which one of the following roles in the argument?\""
          - paragraph [ref=e444]: "The target is the sentence about carbon emissions. Before you have read a word of the stimulus, you already know which claim matters most. When you find it, mentally bracket it and keep asking: what is this sentence doing?"
          - generic [ref=e445]:
            - generic [ref=e446]:
              - img [ref=e447]
              - generic [ref=e449]: "Tip: Read the Question First"
            - paragraph [ref=e451]:
              - text: Always read the stem
              - strong [ref=e452]: before
              - text: the stimulus. It gives you a lens for the argument, so you are reading for structure rather than passively absorbing content.
          - generic [ref=e453]:
            - generic [ref=e454]:
              - img [ref=e455]
              - generic [ref=e457]: When This Step Gets Tricky
            - paragraph [ref=e459]:
              - text: Sometimes the stem paraphrases the target rather than quoting it directly. In those cases, match the
              - strong [ref=e460]: idea
              - text: ", not the exact wording. Look for the sentence in the stimulus that plays the same conceptual role."
          - 'heading "Step 2: Analyze the Statements & Spot Potential Roles" [level=2] [ref=e462]'
          - paragraph [ref=e463]:
            - text: Now read the entire stimulus once. As you go, translate dense language into plain English and assign each sentence a
            - strong [ref=e464]: tentative
            - text: role. You are not proving anything yet. You are building a first-pass map that you will confirm in Step 3.
