          - heading "3.5 Key Takeaways and Practice Focus" [level=3] [ref=e836]
          - list [ref=e837]:
            - listitem [ref=e838]:
              - strong [ref=e839]: "Memorize the Structures:"
              - text: Know the Mistaken Reversal (B → A) and Mistaken Negation (NOT A → NOT B) by name, by formula, and by their abstract structures.
            - listitem [ref=e840]:
              - strong [ref=e841]: "Hunt for the Pattern:"
              - text: When a stimulus provides a conditional rule (A → B), immediately check whether the conclusion relies on observing B (Reversal risk) or observing NOT A (Negation risk).
            - listitem [ref=e842]:
              - strong [ref=e843]: "Diagram First:"
              - text: On Parallel Flaw questions, sketch the abstract structure of the stimulus (e.g., A → B, B observed, concludes A) before reading the answer choices. This makes pattern-matching far faster.
            - listitem [ref=e844]:
              - strong [ref=e845]: "Remember the Mirror:"
              - text: The two fallacies are contrapositives of each other. If you can identify one, you can identify the other by flipping the structure.
            - listitem [ref=e846]:
              - strong [ref=e847]: "Compare to the Contrapositive:"
              - text: The contrapositive (NOT B → NOT A) is the only legitimate way to reverse the direction of the conditional arrow. Every other reversal attempt is a fallacy.
          - generic [ref=e848]:
            - generic [ref=e849]:
              - img [ref=e850]
              - generic [ref=e852]: The Bottom Line
            - paragraph [ref=e854]: "A conditional A → B tells you one thing and one thing only: when A is present, B must follow. It does NOT tell you that B proves A (Mistaken Reversal). It does NOT tell you that the absence of A prevents B (Mistaken Negation). The only valid reverse inference is the contrapositive: NOT B → NOT A. Every other manipulation is a fallacy."