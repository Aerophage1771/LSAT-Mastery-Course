              - paragraph
              - paragraph [ref=e639]:
                - strong [ref=e640]: "Observation:"
                - text: You look outside and see it is NOT raining.
              - paragraph [ref=e641]:
                - strong [ref=e642]: "Flawed Conclusion:"
                - text: "\"Therefore, the sidewalk is NOT wet.\""
              - paragraph
              - paragraph [ref=e643]:
                - strong [ref=e644]: "Why it's wrong:"
                - text: The sprinklers could be on. The absence of one specific sufficient condition (rain) does not guarantee the absence of the necessary condition (wetness). Other causes can independently produce the same result.
