          - heading "3.2 The Mistaken Negation (Denying the Antecedent)" [level=3] [ref=e630]
          - paragraph [ref=e631]: "The Mistaken Negation is the mirror image of the Mistaken Reversal. It occurs when an argument observes that the sufficient condition is absent and concludes that the necessary condition must therefore be absent. In formal terms: the argument treats NOT A → NOT B as valid, when only A → B was established."
