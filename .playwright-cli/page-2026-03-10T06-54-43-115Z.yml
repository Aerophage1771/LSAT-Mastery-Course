          - heading "3.3 The Relationship Between the Two Fallacies" [level=3] [ref=e766]
          - paragraph [ref=e767]: The Mistaken Reversal and the Mistaken Negation are not independent errors—they are contrapositives of each other. If you take the Mistaken Reversal (B → A) and form its contrapositive, you get NOT A → NOT B, which is the Mistaken Negation. This means committing one fallacy logically entails the other.
