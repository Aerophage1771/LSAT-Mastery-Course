          - 'heading "Lesson 3: Two Classic Conditional Reasoning Errors" [level=2] [ref=e384]'
          - paragraph [ref=e385]:
            - strong [ref=e386]: "Objective:"
            - text: To identify and understand the two most common errors in conditional reasoning—the
            - strong [ref=e387]: Mistaken Reversal
            - text: (Affirming the Consequent) and the
            - strong [ref=e388]: Mistaken Negation
            - text: (Denying the Antecedent). These two fallacies account for the majority of conditional reasoning errors on the LSAT, appearing in Flaw, Parallel Flaw, Sufficient Assumption, and Necessary Assumption questions.
          - paragraph [ref=e389]: In Lessons 1 and 2, we established the valid architecture of a conditional statement (A → B) and its only valid inference, the contrapositive (NOT B → NOT A). Now we examine the two invalid moves—arguments that appear plausible on the surface but are structurally unsound. Your goal is to recognize these patterns instantly, even when they are buried in dense LSAT language.
          - table [ref=e391]:
            - rowgroup [ref=e392]:
              - row "Move Formula Validity Core Error" [ref=e393]:
                - columnheader "Move" [ref=e394]
                - columnheader "Formula" [ref=e395]
                - columnheader "Validity" [ref=e396]
                - columnheader "Core Error" [ref=e397]
            - rowgroup [ref=e398]:
              - row "Original A → B Given N/A" [ref=e399]:
                - cell "Original" [ref=e400]
                - cell "A → B" [ref=e401]
                - cell "Given" [ref=e402]
                - cell "N/A" [ref=e403]
              - row "Contrapositive NOT B → NOT A VALID N/A" [ref=e404]:
                - cell "Contrapositive" [ref=e405]
                - cell "NOT B → NOT A" [ref=e406]
                - cell "VALID" [ref=e407]
                - cell "N/A" [ref=e408]
              - row "Mistaken Reversal B → A INVALID Treats necessary as sufficient" [ref=e409]:
                - cell "Mistaken Reversal" [ref=e410]
                - cell "B → A" [ref=e411]
                - cell "INVALID" [ref=e412]
                - cell "Treats necessary as sufficient" [ref=e413]
              - row "Mistaken Negation NOT A → NOT B INVALID Treats absence of one cause as absence of all causes" [ref=e414]:
                - cell "Mistaken Negation" [ref=e415]
                - cell "NOT A → NOT B" [ref=e416]
                - cell "INVALID" [ref=e417]
                - cell "Treats absence of one cause as absence of all causes" [ref=e418]
          - heading "3.1 The Mistaken Reversal (Affirming the Consequent)" [level=3] [ref=e420]
          - paragraph [ref=e421]: "The Mistaken Reversal is the single most common logical trap on the LSAT. It occurs when an argument observes that the necessary condition is present and concludes that the sufficient condition must therefore be present. In formal terms: the argument treats B → A as valid, when only A → B was established."
          - generic [ref=e422]:
            - generic [ref=e423]:
              - img [ref=e424]
              - generic [ref=e426]: "The Real-World Analogy: The Wet Sidewalk"
            - generic [ref=e427]:
              - paragraph [ref=e428]: "Imagine the rule: \"If it rains, the sidewalk gets wet.\" (Rain → Wet)"
              - paragraph
              - paragraph [ref=e429]:
                - strong [ref=e430]: "Observation:"
                - text: You look outside and see the sidewalk is wet.
              - paragraph [ref=e431]:
                - strong [ref=e432]: "Flawed Conclusion:"
                - text: "\"Therefore, it must have rained.\""
              - paragraph
              - paragraph [ref=e433]:
                - strong [ref=e434]: "Why it's wrong:"
                - text: The sidewalk could be wet because of sprinklers, a spilled drink, or a fire hydrant. The presence of the necessary condition (wetness) does not prove that the specific sufficient condition (rain) caused it. There can be multiple sufficient conditions for the same necessary condition.
          - heading "The Invalid Structure" [level=4] [ref=e435]
          - table [ref=e437]:
            - rowgroup [ref=e438]:
              - row "Component Abstract Form Wet-Sidewalk Example" [ref=e439]:
                - columnheader "Component" [ref=e440]
                - columnheader "Abstract Form" [ref=e441]
                - columnheader "Wet-Sidewalk Example" [ref=e442]
            - rowgroup [ref=e443]:
              - row "Rule (Given) A → B Rain → Wet Sidewalk" [ref=e444]:
                - cell "Rule (Given)" [ref=e445]
                - cell "A → B" [ref=e446]
                - cell "Rain → Wet Sidewalk" [ref=e447]
              - row "Evidence B is true The sidewalk is wet" [ref=e448]:
                - cell "Evidence" [ref=e449]
                - cell "B is true" [ref=e450]
                - cell "The sidewalk is wet" [ref=e451]
              - row "Invalid Conclusion Therefore, A must be true Therefore, it rained" [ref=e452]:
                - cell "Invalid Conclusion" [ref=e453]
                - cell "Therefore, A must be true" [ref=e454]
                - cell "Therefore, it rained" [ref=e455]
              - row "Error Necessary treated as sufficient Wetness does not prove rain" [ref=e456]:
                - cell "Error" [ref=e457]
                - cell "Necessary treated as sufficient" [ref=e458]
                - cell "Wetness does not prove rain" [ref=e459]
          - paragraph [ref=e460]:
            - strong [ref=e461]: "Why it fails:"
            - text: "A conditional A → B tells you only one thing: whenever A is present, B must follow. It says absolutely nothing about what happens when B is present on its own. B could exist because of A, or because of some entirely unrelated cause C. The rule only flows in one direction."
          - 'heading "LSAT in Action: The Mistaken Reversal" [level=4] [ref=e463]'
