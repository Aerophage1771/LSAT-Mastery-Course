              - generic [ref=e495]:
                - generic [ref=e496]: "3"
                - generic [ref=e498]:
                  - strong [ref=e499]: Main Conclusion
                  - text: (The concert should be postponed)
          - generic [ref=e500]:
            - generic [ref=e501]:
              - img [ref=e502]
              - generic [ref=e504]: The Why Test
            - paragraph [ref=e506]:
              - text: To identify the main conclusion, ask
              - strong [ref=e507]: "\"Why?\""
              - text: "of each statement. Ask \"Why postpone the concert?\" and the argument answers: \"Because the field will be unsafe.\" Ask \"Why will the field be unsafe?\" and the argument answers: \"Because heavy rain is expected.\" Ask \"Why is heavy rain expected?\" and the argument gives no further support. That confirms the forecast is the premise, the unsafe-field claim is the intermediate conclusion, and postponing is the main conclusion."
          - heading "The Six Roles You Must Know" [level=2] [ref=e509]
          - paragraph [ref=e510]: These are the six role labels you need at the beginning of the module. Later lessons will unpack the harder edge cases, but this vocabulary is the base layer.
          - heading "1. Main Conclusion" [level=3] [ref=e511]
          - paragraph [ref=e512]: The ultimate point the argument is trying to prove. It receives support from other statements, but it does not exist to support anything further inside the same argument.
          - generic [ref=e513]:
            - generic [ref=e514]:
              - img [ref=e515]
              - generic [ref=e517]: Spotting It
            - paragraph [ref=e519]: Look for recommendations (*should, ought to*), predictions (*will, is likely to*), or judgments (*unreasonable, mistaken*). It is the "Ultimate Therefore" of the argument.
          - heading "2. Premise" [level=3] [ref=e520]
          - paragraph [ref=e521]: A fact, finding, or reason offered in support of a conclusion. Premises do the proving. The argument takes them as given and uses them as the foundation for some further claim.
          - generic [ref=e522]:
            - generic [ref=e523]:
              - img [ref=e524]
              - generic [ref=e526]: Spotting It
            - paragraph [ref=e528]: "Premises often follow indicator words: *because, since, for, after all, given that, as evidenced by*. They present facts, study results, or generally accepted truths."
          - heading "3. Intermediate (Subsidiary) Conclusion" [level=3] [ref=e529]
          - paragraph [ref=e530]: A statement that acts as both a conclusion and a premise. It is supported by evidence (making it a conclusion), and it then serves as evidence for the main conclusion (making it a premise). This dual role is what makes it "intermediate."
          - generic [ref=e531]:
            - generic [ref=e532]:
              - img [ref=e533]
              - generic [ref=e535]: Spotting It
            - paragraph [ref=e537]: Find a statement that has a "because" clause supporting it, but is then used to support a further claim. It sits in the middle of the support chain.
          - heading "4. Opposing Viewpoint" [level=3] [ref=e538]
          - paragraph [ref=e539]: A claim made by someone other than the author that the author intends to challenge, refute, or cast doubt upon. Many LSAT arguments are structured as rebuttals where the author first presents someone else's position, then argues against it.
          - generic [ref=e540]:
            - generic [ref=e541]:
              - img [ref=e542]
              - generic [ref=e544]: Spotting It
            - paragraph [ref=e546]: "Introduced by: *Some people argue that..., It has been claimed that..., Many believe that..., Critics contend that...*. The author will then pivot with *But, However, Yet, Nevertheless*."
          - heading "5. Concession" [level=3] [ref=e547]
          - paragraph [ref=e548]: A point the author admits is true, even though it seems to favor the opposing side. The author grants this point to appear reasonable, then explains why it doesn't change their conclusion.
          - generic [ref=e549]:
            - generic [ref=e550]:
              - img [ref=e551]
              - generic [ref=e553]: Spotting It
            - paragraph [ref=e555]: "Flagged by: *Although..., While it is true that..., Granted..., Despite..., Admittedly...*. The author acknowledges the point, then pivots to their main argument."
          - heading "6. Background / Context" [level=3] [ref=e556]
          - paragraph [ref=e557]: Not every sentence is a logical building block. Some statements simply set the stage by providing undisputed facts, introducing a topic, or describing a phenomenon that the argument will then analyze. Background statements neither support nor are supported by other claims.
          - generic [ref=e558]:
            - generic [ref=e559]:
              - img [ref=e560]
              - generic [ref=e562]: Spotting It
            - paragraph [ref=e564]: "These often appear at the very beginning of the stimulus and present general facts without argumentative force: *\"Landfills are generally designed to hold ten years' worth of waste...\"*"
          - heading "Indicator Words Reference" [level=2] [ref=e566]
          - paragraph [ref=e567]: Indicator words are often the fastest clue to structure. They do not replace analysis, but they are excellent first signals for whether a statement is offering support, receiving support, or pivoting to a contrasting view.
