        - generic [ref=e396]:
          - 'heading "MODULE 1: Argument Part" [level=2] [ref=e397]'
          - paragraph [ref=e398]:
            - strong [ref=e399]: "Question Goal:"
            - text: Determine the exact job a sentence is doing inside an argument. Is it the author's main point, a supporting reason, a bridge between two ideas, or a statement the author is acknowledging or pushing against?
          - heading "Why This Matters" [level=3] [ref=e401]
          - paragraph [ref=e402]: Argument Part is the foundation beneath almost every other LR skill. Before you can weaken an argument, strengthen it, expose its flaw, or identify its assumption, you need to know which sentence is the point and which sentences are doing the support work.
          - generic [ref=e403]:
            - generic [ref=e404]:
              - img [ref=e405]
              - generic [ref=e407]: Frequency
            - paragraph [ref=e409]:
              - text: Argument Part questions appear on virtually every scored Logical Reasoning section. Combined with Main Conclusion (Module 2), identification questions account for roughly
              - strong [ref=e410]: 15% of all LR questions
              - text: . More importantly, the skill itself is a prerequisite for the other 85%.
          - heading "What Makes This Question Type Unique" [level=3] [ref=e411]
          - paragraph [ref=e412]:
            - text: Unlike most LR questions, Argument Part does not ask whether the reasoning works. You are not fixing the argument or judging its strength. You are stepping back and
            - strong [ref=e413]: describing the role each sentence plays
            - text: inside the argument's structure.
          - paragraph [ref=e414]: The stem will quote or paraphrase a target sentence, and your task is to place that sentence in the support chain. That means reading the whole stimulus, tracing which claims support which others, and then labeling the highlighted statement in abstract terms.
          - heading "Recognizing the Question" [level=3] [ref=e415]
          - paragraph [ref=e416]: "You can identify an Argument Part question because the stem will cite a specific phrase or sentence and ask you to describe its role. Look for these patterns:"
          - table [ref=e418]:
            - rowgroup [ref=e419]:
              - row "Question Stem Pattern Key Signal" [ref=e420]:
                - columnheader "Question Stem Pattern" [ref=e421]
                - columnheader "Key Signal" [ref=e422]
            - rowgroup [ref=e423]:
              - row "\"The statement that [X] plays which one of the following roles in the argument?\" Asks for the role of a quoted claim" [ref=e424]:
                - cell "\"The statement that [X] plays which one of the following roles in the argument?\"" [ref=e425]
                - cell "Asks for the role of a quoted claim" [ref=e426]:
                  - text: Asks for the
                  - strong [ref=e427]: role
                  - text: of a quoted claim
              - row "\"The claim that [X] figures in the argument in which one of the following ways?\" Asks how a claim figures in the argument" [ref=e428]:
                - cell "\"The claim that [X] figures in the argument in which one of the following ways?\"" [ref=e429]
                - cell "Asks how a claim figures in the argument" [ref=e430]:
                  - text: Asks how a claim
                  - strong [ref=e431]: figures in
                  - text: the argument
              - row "\"Which one of the following most accurately describes the relationship between...\" Asks about the relationship between two claims" [ref=e432]:
                - cell "\"Which one of the following most accurately describes the relationship between...\"" [ref=e433]
                - cell "Asks about the relationship between two claims" [ref=e434]:
