          - heading "The Anatomy of an Argument" [level=2] [ref=e441]
          - paragraph [ref=e442]: An LSAT argument is a structured claim where some statements provide support for other statements. To master Argument Part questions, you need to see every argument as a machine with identifiable moving parts.
          - paragraph [ref=e443]: "Consider this simple argument:"
          - generic [ref=e444]: "\"The committee should postpone the outdoor concert. The field will be unsafe, since heavy rain is expected all evening.\""
          - paragraph [ref=e445]: "This simple argument has three parts working together:"
          - generic [ref=e446]:
            - generic [ref=e447]:
              - generic [ref=e448]:
                - generic [ref=e449]: Sentence
                - generic [ref=e450]: "\"The committee should postpone the outdoor concert.\""
                - generic [ref=e451]: Main Conclusion
              - generic [ref=e453]:
                - generic [ref=e454]: Structural Role
                - paragraph [ref=e456]: This is the final recommendation. It is the claim the argument ultimately wants you to accept, so everything else is working toward it.
            - generic [ref=e457]:
              - generic [ref=e458]:
                - generic [ref=e459]: Sentence
                - generic [ref=e460]: "\"Heavy rain is expected all evening.\""
                - generic [ref=e461]: Premise
              - generic [ref=e463]:
                - generic [ref=e464]: Structural Role
                - paragraph [ref=e466]: This is the underlying evidence. The argument treats it as the fact that starts the chain of support.
            - generic [ref=e467]:
              - generic [ref=e468]:
                - generic [ref=e469]: Sentence
                - generic [ref=e470]: "\"The field will be unsafe.\""
                - generic [ref=e471]: Intermediate Conclusion
              - generic [ref=e473]:
                - generic [ref=e474]: Structural Role
                - paragraph [ref=e476]: This is the bridge statement. It is supported by the forecasted rain, and it in turn supports the recommendation to postpone the concert.
          - heading "The Flow of Support" [level=3] [ref=e477]
          - paragraph [ref=e478]:
            - text: "Every argument has a direction: evidence flows toward conclusions. The key insight is that support always moves"
            - strong [ref=e479]: upward
            - text: toward the main conclusion. Premises support intermediate conclusions, which support the main conclusion.
